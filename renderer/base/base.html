<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Base | Gestor de Capacitación</title>
  <link rel="stylesheet" href="../shared/menu.css" />
  <link rel="stylesheet" href="../shared/ui.css" />
  <link rel="stylesheet" href="./base.css" />
</head>
<body data-active-menu="base">
  <div data-menu-root></div>

  <main class="page-shell">
    <header class="page-header">
      <div>
        <h1>Base local</h1>
        <p>Consulta todo lo que Documentos ha guardado localmente. Esta página no procesa PDF.</p>
      </div>
      <div class="actions">
        <button class="btn-secondary" id="btnRefreshBase">Actualizar</button>
        <button class="btn-primary" id="btnOpenBaseFolder">Abrir carpeta</button>
      </div>
    </header>

    <section class="card">
      <div class="base-tabs" aria-label="Vistas de la base">
        <button class="base-tab active" data-base-view="resumen">Resumen</button>
        <button class="base-tab" data-base-view="documentos">Documentos</button>
        <button class="base-tab" data-base-view="tipos">Tipos documentales</button>
        <button class="base-tab" data-base-view="detalles">Detalles</button>
        <button class="base-tab" data-base-view="procesamientos">Procesamientos</button>
      </div>

      <div class="base-toolbar">
        <div class="base-toolbar-left">
          <input type="search" id="baseSearch" placeholder="Buscar en la vista actual" />
          <select id="baseDocumentType" class="type-filter">
            <option value="">Todos los tipos</option>
            <option value="plan-individual">Planes Individuales</option>
            <option value="acuerdo-patrocinio">Acuerdos de Patrocinio</option>
            <option value="planificacion-capacitacion">Planificaciones de Capacitación</option>
            <option value="informe-final-capacitacion">Informes Finales de Capacitación</option>
            <option value="instrumento-evaluacion">Instrumentos de Evaluación</option>
            <option value="informe-impacto">Informes de Impacto</option>
          </select>
          <label><input type="checkbox" id="baseReviewOnly" /> Solo para revisión</label>
        </div>
        <button class="btn-secondary" id="btnApplyBaseFilters">Aplicar filtros</button>
      </div>

      <div class="status-box status-info" id="baseStatus">Consultando la base local...</div>
      <div class="base-view" id="baseView"><div class="empty">Cargando información...</div></div>
    </section>
  </main>

  <script src="../shared/menu.js"></script>
  <script src="../shared/ui.js"></script>
  <script src="./vistas/resumen.view.js"></script>
  <script src="./vistas/documentos.view.js"></script>
  <script src="./vistas/tipos.view.js"></script>
  <script src="./vistas/detalles.view.js"></script>
  <script src="./vistas/procesamientos.view.js"></script>
  <script src="./base.js"></script>
</body>
</html>
