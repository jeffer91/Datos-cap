name: CI

on:
  push:
    branches:
      - main
      - etapa-1-base-modular
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar dependencias
        run: npm install

      - name: Verificar sintaxis JavaScript
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find . -path './node_modules' -prune -o -name '*.js' -print0)

      - name: Diagnóstico general
        run: npm run selftest

      - name: Probar Plan Individual
        run: npm run test:plan-individual

      - name: Probar Planificación por Curso
        run: npm run test:planificacion-curso

      - name: Probar Acuerdo de Patrocinio
        run: npm run test:acuerdo-patrocinio

      - name: Probar Informe Final
        run: npm run test:informe-final

      - name: Probar Instrumento de Evaluación
        run: npm run test:instrumento-evaluacion

      - name: Probar Informe de Impacto
        run: npm run test:informe-impacto

      - name: Probar Detección de Necesidades
        run: npm run test:deteccion-necesidades

      - name: Generar diagnóstico del Plan General de Capacitación
        shell: bash
        run: |
          set +e
          npm run test:plan-general-capacitacion > plan-general-debug.txt 2>&1
          echo "$?" > plan-general-exit-code.txt
          exit 0

      - name: Guardar diagnóstico del Plan General
        uses: actions/upload-artifact@v4
        with:
          name: plan-general-debug
          path: |
            plan-general-debug.txt
            plan-general-exit-code.txt

      - name: Verificar Plan General de Capacitación
        shell: bash
        run: |
          codigo=$(cat plan-general-exit-code.txt)
          if [ "$codigo" != "0" ]; then
            cat plan-general-debug.txt
            exit "$codigo"
          fi
