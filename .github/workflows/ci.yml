name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias
        run: npm install

      - name: Verificar sintaxis JavaScript
        run: find . -path './node_modules' -prune -o -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Probar módulos, exportación y base local
        run: npm run selftest
