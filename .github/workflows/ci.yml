name: CI

on:
  push:
    branches:
      - main
      - etapa-1-base-modular
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar dependencias
        run: npm install

      - name: Verificar sintaxis JavaScript
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find . -path './node_modules' -prune -o -name '*.js' -print0)

      - name: Diagnóstico general
        run: npm run selftest

      - name: Probar Plan Individual
        run: npm run test:plan-individual

      - name: Probar Planificación por Curso
        run: npm run test:planificacion-curso

      - name: Probar Acuerdo de Patrocinio
        run: npm run test:acuerdo-patrocinio

      - name: Probar Informe Final
        run: npm run test:informe-final

      - name: Probar Instrumento de Evaluación
        run: npm run test:instrumento-evaluacion

      - name: Probar Informe de Impacto
        run: npm run test:informe-impacto

      - name: Probar Detección de Necesidades
        run: npm run test:deteccion-necesidades

      - name: Probar Plan General de Capacitación
        run: npm run test:plan-general-capacitacion

      - name: Probar Base de Datos Local
        run: npm run test:local-database

      - name: Probar Consultas y Filtros
        run: npm run test:query-service

      - name: Probar Respaldo y Restauración
        run: npm run test:backup-service

  electron-integration:
    name: Integración Electron y OCR
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar dependencias
        run: npm install

      - name: Preparar pantalla virtual
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Procesar ocho PDF desde la interfaz real
        shell: bash
        env:
          INTEGRATION_ARTIFACT_DIR: ${{ github.workspace }}/artifacts/electron-integration
          ELECTRON_ENABLE_LOGGING: "1"
        run: |
          mkdir -p "$INTEGRATION_ARTIFACT_DIR"
          set +e
          xvfb-run --auto-servernum --server-args="-screen 0 1440x1000x24" npm run test:electron-integration > "$INTEGRATION_ARTIFACT_DIR/runner.log" 2>&1
          status=$?
          echo "----- ÚLTIMAS 180 LÍNEAS DEL RUNNER -----"
          tail -n 180 "$INTEGRATION_ARTIFACT_DIR/runner.log"
          exit $status

      - name: Publicar reporte, PDF, Excel, JSON y capturas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: electron-integration-artifacts
          path: artifacts/electron-integration
          if-no-files-found: warn
          retention-days: 14
